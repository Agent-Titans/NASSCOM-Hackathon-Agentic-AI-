
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign In</title>
  <style>
    :root {
      --bg: #ffffff;
      --surface: #f5f5f7;
      --surface-warm: #fbfbfd;
      --fg: #1d1d1f;
      --fg-2: #424245;
      --muted: #6e6e73;
      --meta: #86868b;
      --border: #d2d2d7;
      --border-soft: #e8e8ed;
      --accent: #0071e3;
      --accent-on: #ffffff;
      --accent-hover: #0077ed;
      --accent-active: #0066cc;
      --font-display: "SF Pro Display", "SF Pro Icons", "Helvetica Neue", Helvetica, Arial, sans-serif;
      --font-body: "SF Pro Text", "SF Pro Icons", "Helvetica Neue", Helvetica, Arial, sans-serif;
      --text-sm: 14px;
      --text-base: 17px;
      --text-lg: 21px;
      --text-xl: 28px;
      --text-2xl: 40px;
      --leading-body: 1.47;
      --tracking-display: -0.015em;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 18px;
      --radius-pill: 980px;
      --elev-raised: 0 12px 32px rgba(0,0,0,0.08);
      --focus-ring: 0 0 0 4px color-mix(in oklab, var(--accent), transparent 65%);
      --ease-standard: cubic-bezier(0.28,0,0.22,1);
      --motion-base: 220ms;
      --motion-fast: 150ms;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      min-height: 100dvh;
      background: var(--surface);
      font-family: var(--font-body);
      font-size: var(--text-base);
      line-height: var(--leading-body);
      color: var(--fg);
      -webkit-font-smoothing: antialiased;
      display: grid;
      place-items: center;
      padding: 24px 16px;
    }

    /* ── top nav ── */
    .nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      background: color-mix(in oklab, var(--surface) 80%, transparent);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border-bottom: 1px solid var(--border-soft);
    }
    .nav-logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--fg);
    }
    .nav-logo svg { width: 20px; height: 20px; }

    /* ── card ── */
    .card {
      background: var(--bg);
      border-radius: var(--radius-lg);
      box-shadow: var(--elev-raised);
      padding: 48px 48px 40px;
      width: 100%;
      max-width: 400px;
      margin-top: 44px;
    }

    /* ── header ── */
    .card-header {
      text-align: center;
      margin-bottom: 32px;
    }
    .card-header .apple-mark {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 48px;
      background: var(--fg);
      border-radius: 50%;
      margin-bottom: 16px;
    }
    .card-header .apple-mark svg {
      width: 26px;
      height: 26px;
      fill: var(--bg);
    }
    .card-header h1 {
      font-family: var(--font-display);
      font-size: var(--text-xl);
      font-weight: 600;
      letter-spacing: var(--tracking-display);
      color: var(--fg);
      margin-bottom: 6px;
    }
    .card-header p {
      font-size: var(--text-sm);
      color: var(--muted);
      line-height: 1.4;
    }

    /* ── form ── */
    .form-group {
      margin-bottom: 14px;
    }
    .form-group label {
      display: block;
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--fg-2);
      margin-bottom: 6px;
      letter-spacing: -0.01em;
    }
    .form-group .field-wrap {
      position: relative;
    }
    .form-group .field-icon {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--meta);
      pointer-events: none;
      display: flex;
    }
    .form-group .field-icon svg {
      width: 16px;
      height: 16px;
    }
    .form-group input {
      width: 100%;
      height: 44px;
      padding: 0 12px 0 40px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: var(--font-body);
      font-size: var(--text-base);
      color: var(--fg);
      outline: none;
      transition: border-color var(--motion-fast) var(--ease-standard),
                  box-shadow var(--motion-fast) var(--ease-standard);
      -webkit-appearance: none;
    }
    .form-group input::placeholder {
      color: var(--meta);
    }
    .form-group input:hover {
      border-color: color-mix(in oklab, var(--border) 60%, var(--fg) 40%);
    }
    .form-group input:focus {
      border-color: var(--accent);
      box-shadow: var(--focus-ring);
      background: var(--bg);
    }

    /* password toggle */
    .toggle-pass {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--meta);
      padding: 4px;
      display: flex;
      border-radius: 4px;
      transition: color var(--motion-fast) var(--ease-standard);
    }
    .toggle-pass:hover { color: var(--fg); }
    .toggle-pass svg { width: 16px; height: 16px; }

    /* forgot link */
    .forgot-row {
      text-align: right;
      margin-top: -4px;
      margin-bottom: 20px;
    }
    .forgot-row a {
      font-size: var(--text-sm);
      color: var(--accent);
      text-decoration: none;
      transition: color var(--motion-fast) var(--ease-standard);
    }
    .forgot-row a:hover { color: var(--accent-hover); }

    /* ── buttons ── */
    .btn-primary {
      display: block;
      width: 100%;
      height: 44px;
      background: var(--accent);
      color: var(--accent-on);
      border: none;
      border-radius: var(--radius-pill);
      font-family: var(--font-body);
      font-size: var(--text-base);
      font-weight: 600;
      letter-spacing: -0.01em;
      cursor: pointer;
      transition: background var(--motion-fast) var(--ease-standard),
                  transform 80ms var(--ease-standard);
    }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-primary:active { background: var(--accent-active); transform: scale(0.985); }
    .btn-primary:focus-visible { outline: none; box-shadow: var(--focus-ring); }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      color: var(--meta);
      font-size: var(--text-sm);
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border-soft);
    }

    .btn-secondary {
      display: block;
      width: 100%;
      height: 44px;
      background: transparent;
      color: var(--accent);
      border: 1.5px solid var(--accent);
      border-radius: var(--radius-pill);
      font-family: var(--font-body);
      font-size: var(--text-base);
      font-weight: 600;
      letter-spacing: -0.01em;
      cursor: pointer;
      transition: background var(--motion-fast) var(--ease-standard),
                  color var(--motion-fast) var(--ease-standard),
                  transform 80ms var(--ease-standard);
    }
    .btn-secondary:hover {
      background: color-mix(in oklab, var(--accent) 8%, transparent);
    }
    .btn-secondary:active {
      background: color-mix(in oklab, var(--accent) 14%, transparent);
      transform: scale(0.985);
    }
    .btn-secondary:focus-visible { outline: none; box-shadow: var(--focus-ring); }

    /* ── footer note ── */
    .card-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 12px;
      color: var(--meta);
      line-height: 1.5;
    }
    .card-footer a {
      color: var(--accent);
      text-decoration: none;
    }
    .card-footer a:hover { color: var(--accent-hover); }

    /* ── responsive ── */
    @media (max-width: 480px) {
      .card {
        padding: 36px 24px 28px;
        border-radius: var(--radius-md);
        box-shadow: none;
        border: 1px solid var(--border-soft);
      }
    }
  </style>
</head>
<body>

  <!-- top nav -->
  <nav class="nav" role="banner">
    <div class="nav-logo">
      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z" fill="currentColor"/>
      </svg>
      MyApp
    </div>
  </nav>

  <!-- login card -->
  <main>
    <div class="card" role="main">
      <header class="card-header">
        <div class="apple-mark" aria-hidden="true">
          <!-- Apple-style lock/key icon -->
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
          </svg>
        </div>
        <h1>Sign In</h1>
        <p>Enter your credentials to access your account</p>
      </header>

      <form id="login-form" novalidate>
        <!-- Email -->
        <div class="form-group">
          <label for="email">Email Address</label>
          <div class="field-wrap">
            <span class="field-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="4" width="20" height="16" rx="2"/>
                <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
              </svg>
            </span>
            <input
              type="email"
              id="email"
              name="email"
              autocomplete="email"
              placeholder="you@example.com"
              required
              aria-required="true"
            />
          </div>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label for="password">Password</label>
          <div class="field-wrap">
            <span class="field-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
            </span>
            <input
              type="password"
              id="password"
              name="password"
              autocomplete="current-password"
              placeholder="••••••••"
              required
              aria-required="true"
            />
            <button type="button" class="toggle-pass" id="toggle-pass" aria-label="Show password">
              <svg id="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- Forgot -->
        <div class="forgot-row">
          <a href="#" tabindex="0">Forgot password?</a>
        </div>

        <!-- Primary CTA -->
        <button type="submit" class="btn-primary" id="login-btn">
          Sign In
        </button>

        <div class="divider" role="separator"><span>or</span></div>

        <!-- Secondary CTA -->
        <button type="button" class="btn-secondary" id="signup-btn">
          Create Account
        </button>
      </form>

      <footer class="card-footer">
        By continuing, you agree to our
        <a href="#">Terms of Use</a> and <a href="#">Privacy Policy</a>.
      </footer>
    </div>
  </main>

  <script>
    // Password visibility toggle
    const toggleBtn = document.getElementById('toggle-pass');
    const pwdInput  = document.getElementById('password');
    const eyeIcon   = document.getElementById('eye-icon');

    const eyeOpen  = `<path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/>`;
    const eyeSlash = `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>`;

    toggleBtn.addEventListener('click', () => {
      const isPass = pwdInput.type === 'password';
      pwdInput.type = isPass ? 'text' : 'password';
      eyeIcon.innerHTML = isPass ? eyeSlash : eyeOpen;
      toggleBtn.setAttribute('aria-label', isPass ? 'Hide password' : 'Show password');
    });

    // Form submit feedback
    document.getElementById('login-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      const email = document.getElementById('email').value;
      const pass  = document.getElementById('password').value;

      if (!email || !pass) {
        btn.textContent = 'Please fill all fields';
        btn.style.background = '#ff3b30';
        setTimeout(() => {
          btn.textContent = 'Sign In';
          btn.style.background = '';
        }, 2000);
        return;
      }

      btn.textContent = 'Signing in…';
      btn.disabled = true;
      setTimeout(() => {
        btn.textContent = 'Sign In';
        btn.disabled = false;
      }, 1800);
    });

    // Sign-up button
    document.getElementById('signup-btn').addEventListener('click', () => {
      const btn = document.getElementById('signup-btn');
      btn.textContent = 'Opening sign-up…';
      setTimeout(() => { btn.textContent = 'Create Account'; }, 1500);
    });
  </script>
</body>
</html>
